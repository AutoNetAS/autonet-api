                      type: integer
                    company_id:
                      type: integer
                    reference_table:
                      type: string
                    reference_id:
                      type: integer
                    relation_table:
                      type: string
                      nullable: true
                    relation_id:
                      type: integer
                    url:
                      type: string
                      format: uri
                    description:
                      type: string
                      nullable: true
                    password:
                      type: string
                      nullable: true
