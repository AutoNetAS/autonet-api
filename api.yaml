      tags:
        - Leads
      summary: Insert lead
      security:
        - TokenHeader: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - source
                - name
              properties:
                source:
                  type: string
                  description: The main source of the lead
                  enum:
                    - EMAIL
                    - SMS_IN
                    - TELEPHONE
                    - FACEBOOK
                    - CONTACT_FORM
                    - FINN
                name:
                  type: string
                  description: Overall description of lead
                email:
                  type: string
                phone:
                  type: string
                  description: Max 8 chars, do not include +47, etc.
                category_id:
                  type: integer
                  format: int32
                assigned_member_ids:
                  type: string
                  format: JSON
                  description: JSON encoded with member IDs, e.g., ["20004", "20008"]
                vehicle_ids:
                  type: string
                  format: JSON
                  description: JSON encoded with vehicle IDs, e.g., ["10004", "10008"]
                priority:
                  type: string
                  enum:
                    - LOW
                    - MEDIUM
                    - HIGH
      responses:
        '200':
          description: Data
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int32
                    description: Lead ID
