  /deals/list:
    get:
      tags: [Offers]
      summary: List offers
      description: |
        Returns a paginated list of offers with optional filters. Each offer includes its customer, vehicles, and status counts.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: perPage
          in: query
          schema:
            type: integer
            default: 25
            minimum: 1
            maximum: 100
          description: Results per page
        - name: status
          in: query
          schema:
            type: string
            default: all
            enum: [all, draft, sent, accepted, declined, expired, converted]
          description: Filter by offer status
        - name: type
          in: query
          schema:
            type: string
            example: salg,innkjop
          description: Comma-separated offer types to filter by (`innkjop`, `kommisjon`, `formidling`, `salg`)
        - name: sortBy
          in: query
          schema:
            type: string
            default: newest
            enum: [newest, oldest, price_desc, price_asc, customer_asc]
          description: Sort order
        - name: search
          in: query
          schema:
            type: string
          description: Search by offer number, customer name, or vehicle
        - name: customer
          in: query
          schema:
            type: string
          description: Search by customer name
        - name: vehicle
          in: query
          schema:
            type: string
          description: Search by vehicle make, model, or registration number
        - name: priceFrom
          in: query
          schema:
            type: number
          description: Minimum total price
        - name: priceTo
          in: query
          schema:
            type: number
          description: Maximum total price
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
            example: "2025-01-01"
          description: Created from date (YYYY-MM-DD)
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
            example: "2025-12-31"
          description: Created to date (YYYY-MM-DD)
      responses:
        "200":
          description: Paginated list of offers
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/OfferSummary"
                  page:
                    type: integer
                    example: 1
                  perPage:
                    type: integer
                    example: 25
                  pages:
                    type: integer
                    example: 4
                    description: Total number of pages
                  total:
                    type: integer
                    example: 87
                    description: Total number of offers matching filters
                  statusCounts:
                    $ref: "#/components/schemas/StatusCounts"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

  /deals/get/{id}:
    get:
      tags: [Offers]
