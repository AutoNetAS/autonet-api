# ═══════════════════════════════════════════════════════════════════════
#  COMPONENTS
# ═══════════════════════════════════════════════════════════════════════

components:

  securitySchemes:
    ApiToken:
      type: apiKey
      in: header
      name: token
      description: API token from AutoNet portal

  parameters:
    DealId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Offer ID
    ContractId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Contract ID

  schemas:

    ErrorResponse:
      type: object
      properties:
        response:
          type: string
          example: error
        message:
          type: string

    # ── Data (Reference) ──

    DataItem:
      type: object
      properties:
        id:
          type: integer
        value:
          type: string
          description: Internal value
        display:
          type: string
          description: Display name

    # ── Members ──

    Member:
      type: object
      properties:
        id:
          type: integer
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        telephone:
          type: string
        date_of_birth:
          type: string
        address:
          type: object
          properties:
            street:
              type: string
            postal_code:
              type: string
            city:
              type: string
            country:
              type: string
              example: "NO"
        job_position:
          type: string
        profile_picture_url:
          type: string
          nullable: true
        2fa_activated:
          type: boolean
        permissions:
          type: object
        notifications:
          type: object
        active:
          type: boolean

    # ── Deals ──

    DealStatusCounts:
      type: object
      properties:
        all:
          type: integer
        draft:
          type: integer
        sent:
          type: integer
        expired:
          type: integer
        accepted:
          type: integer
        declined:
          type: integer
        converted:
          type: integer

    DealCustomer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone_number:
          type: string

    DealVehicle:
      type: object
      properties:
        id:
          type: integer
        vehicle_id:
          type: integer
          nullable: true
        make:
          type: string
        model:
          type: string
        variant:
          type: string
        year:
          type: integer
        vin:
          type: string
        registration_number:
          type: string
        mileage:
          type: integer
        fuel_type:
          type: string
        transmission:
          type: string
        color:
          type: string
