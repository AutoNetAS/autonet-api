        Creates a new lead. `source` and `name` are required.
      operationId: leadsAdd
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [source, name]
              properties:
                source:
                  type: string
                  description: "**Required.** Lead source (e.g. website name, campaign)"
                name:
                  type: string
                  description: "**Required.** Customer name"
