  /deals/add:
    post:
      tags: [Offers]
      summary: Create offer
      description: |
        Creates a new deal offer. The `offer_type` field is required. Vehicles, line items, and trade-ins can be included in the same request.

        A unique `offer_number` and `portal_token` are generated automatically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfferCreate"
            example:
              offer_type: salg
              customer_id: 1234
              total_price: 450000
              vat_amount: 90000
              vat_rate: 25
              include_vat: 1
              valid_until: "2025-08-01"
              notes: "Tilbud gjelder i 14 dager."
              vehicles:
                - vehicle_id: 5678
                  make: Toyota
                  model: RAV4
                  year: 2023
                  registration_number: AB12345
                  vehicle_price: 420000
                  discount_amount: 10000
                  is_new: 0
                  mileage: 35000
                  fuel_type: Hybrid
                  include_financing: 1
                  financing_type: annuity
                  down_payment: 100000
                  interest_rate: 5.99
                  loan_term_months: 60
                  loan_amount: 320000
                  monthly_payment: 6195
              line_items:
                - name: Lakk-beskyttelse
                  description: Keramisk lakk-beskyttelse
                  quantity: 1
                  unit_price: 15000
                  total_price: 15000
                  vat_rate: 25
              trade_ins:
                - make: Volkswagen
                  model: Golf
                  year: 2018
                  registration_number: CD67890
                  mileage: 95000
                  estimated_value: 120000
                  vehicle_price: 115000
                  condition: good
      responses:
        "201":
          description: Offer created
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 42
                        description: The new offer ID
                      portal_token:
                        type: string
                        example: a1b2c3d4e5f6...
                        description: Token for customer portal access
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                response: error
                message: "Missing or invalid offer_type. Allowed: innkjop, kommisjon, formidling, salg"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /deals/update/{id}:
    put:
      tags: [Offers]
      summary: Update offer
      description: |
        Updates an existing offer. Only the fields provided will be updated.

        **Note:** `vehicles`, `line_items`, and `trade_ins` arrays are replaced entirely — not merged. Include all items you want to keep.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Offer ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfferUpdate"
            example:
              total_price: 440000
              notes: "Oppdatert pris etter forhandling."
              vehicles:
                - vehicle_id: 5678
                  make: Toyota
                  model: RAV4
                  year: 2023
                  vehicle_price: 410000
                  discount_amount: 10000
      responses:
        "200":
          description: Offer updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 42
                      portal_token:
                        type: string
        "404":
          description: Offer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /deals/updateStatus/{id}:
    post:
      tags: [Offers]
      summary: Update offer status
      description: |
        Updates the status of an offer. Timestamps are set automatically:
        - Setting `sent` → sets `sent_at`
        - Setting `accepted` → sets `accepted_at`
        - Setting `declined` → sets `declined_at`

        When declining, include a `decline_reason`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Offer ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [draft, sent, accepted, declined]
                  description: The new status
                decline_reason:
                  type: string
                  description: Reason for declining (required when status is `declined`)
            examples:
              send:
                summary: Send offer to customer
                value:
                  status: sent
              accept:
                summary: Mark as accepted
                value:
                  status: accepted
              decline:
                summary: Mark as declined
                value:
                  status: declined
                  decline_reason: "Kunden fant bedre pris hos konkurrent"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Status oppdatert
        "400":
          description: Invalid status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                response: error
                message: "Missing or invalid status. Allowed: draft, sent, accepted, declined"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /deals/delete/{id}:
    delete:
      tags: [Offers]
      summary: Delete offer
      description: |
        Permanently deletes an offer and all related data (vehicles, line items, trade-ins, events, signatures).

        Only offers with status `draft` or `sent` can be deleted.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Offer ID
      responses:
        "200":
          description: Offer deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Tilbud slettet
        "400":
          description: Cannot delete (offer is accepted, declined, or converted)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Offer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

