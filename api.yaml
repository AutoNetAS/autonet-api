openapi: 3.0.0
info:
  title: AutoNet REST API
  description: |
    REST API for the AutoNet Dealer Management System. Manage ads, vehicles, contracts, deals, leads, members, documents, and reference data.

    ## Authentication

    All requests require an API token passed via the `token` header:

    ```
    token: YOUR_API_TOKEN
    ```

    Tokens are managed in **Company Settings > API Access** in the AutoNet portal. Each token has scopes (e.g. `deals`, `contract`, `ad`) that control access.

    ## Rate Limiting

    - **500 requests per day** per token
    - Headers included in every response:
      - `X-RateLimit-Limit` — Max requests per day
      - `X-RateLimit-Remaining` — Remaining requests
      - `X-RateLimit-Reset` — Unix timestamp when limit resets
    - Exceeding the limit returns `429 Too Many Requests`

    ## Response Format

    All JSON responses include a `response` field:

    ```json
    { "response": "success", "data": { ... } }
    ```

    ```json
    { "response": "error", "message": "Error description" }
    ```

    ## Available Scopes

    | Scope | Description |
    |---|---|
    | `ad` | Ads management — list, get, create, upload media |
    | `vehicle` | Vehicle lookup — registration data, equipment, service history, owners |
    | `contract` | Contracts — CRUD, sign/complete, PDF documents |
    | `deals` | Deals/offers — CRUD, status management |
    | `leads` | Leads/CRM — list, create, correspondence |
    | `member` | Team members — list members |
    | `data` | Reference data — makes, models, fuels, colors, body types |
    | `documents` | Document uploads — get and upload files |
  version: 1.0.0

servers:
  - url: https://app.autonet.no/rest/v1
    description: Production

tags:
  - name: Ads
    description: |
      Manage vehicle ads/listings. Scope: `ad`

      **Statuses:** `FOR_SALE`, `RESERVED`, `SOLD`, `DRAFT`, `COMING_SOON`, `IN_STOCK`, `INACTIVE`

  - name: Vehicles
    description: |
      Vehicle lookup from Norwegian public registries (Vegvesen, Brønnøysund). Scope: `vehicle`

      Lookup by license plate or VIN. Returns technical data, liens, equipment, service history, and ownership info.

  - name: Contracts
    description: |
      Manage vehicle contracts (kontrakter). Scope: `contract`

      **Types:** `SALE`, `PURCHASE`, `SPECIAL_PURCHASE`, `BROKERAGE`, `COMMISION`

      **Statuses:** `DRAFT` → `CONTRACT_SIGNED` → `COMPLETED`

  - name: Deals
    description: |
      Manage deal offers (tilbud). Scope: `deals`

      **Offer types:** `salg` (sale), `innkjop` (purchase), `kommisjon` (commission), `formidling` (brokerage)

      **Statuses:** `draft` → `sent` → `accepted` / `declined` → `converted`

  - name: Leads
    description: |
      CRM leads management. Scope: `leads`

      Create leads, add correspondence, send messages, and manage categories.

  - name: Members
    description: |
      Team members. Scope: `member`

      List company members with contact info, permissions, and notification settings.

  - name: Data
    description: |
      Reference/lookup data. Scope: `data`

      Vehicle makes, models, fuels, colors, body types, tax classes, and vehicle types.

  - name: Documents
    description: |
      File uploads and retrieval. Scope: `documents`

      Upload and retrieve documents attached to various entities (ads, contracts, leads, etc.).

# ═══════════════════════════════════════════════════════════════════════
#  ADS
# ═══════════════════════════════════════════════════════════════════════

paths:

  /ad/get:
    get:
      tags: [Ads]
      summary: List ads
      description: |
        Returns ads filtered by status. Supports search, pagination, and sorting.
      operationId: adList
      parameters:
        - name: status
          in: query
          schema:
            type: string
            default: FOR_SALE
            enum: [FOR_SALE, RESERVED, SOLD, DRAFT, COMING_SOON, IN_STOCK, INACTIVE]
        - name: search
          in: query
          schema:
            type: string
          description: Search by make, model, registration number, etc.
        - name: rows_limit
          in: query
          schema:
            type: integer
            default: 100
          description: Max number of results
        - name: total_rows
          in: query
          schema:
            type: integer
          description: If set, includes total count
        - name: order_by
          in: query
          schema:
            type: string
          description: Field to sort by
        - name: order_direction
          in: query
          schema:
            type: string
            enum: [ASC, DESC]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

  /ad/get/{id}:
    get:
      tags: [Ads]
      summary: Get ad by ID
      description: Returns a single ad with full details.
      operationId: adGet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            default: FOR_SALE
            enum: [FOR_SALE, RESERVED, SOLD, DRAFT, COMING_SOON, IN_STOCK, INACTIVE]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  /ad/getByVehicleId/{vehicleId}:
    get:
      tags: [Ads]
      summary: Get ad by vehicle ID
      description: Returns the ad associated with a vehicle.
      operationId: adGetByVehicleId
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  /ad/getByIdentifier/{identifier}:
    get:
      tags: [Ads]
      summary: Find ad by license plate or VIN
      description: |
        Searches for vehicles by license plate or VIN and returns matching ads. Results are ordered by status priority (FOR_SALE first).
      operationId: adGetByIdentifier
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
          description: License plate number or VIN
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    vehicle_id:
                      type: integer
                    ad_id:
                      type: integer
                      nullable: true
                    license_number:
                      type: string
                    vin:
                      type: string
                    status:
                      type: string
                    creation_date:
                      type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /ad/defaultDescription:
    get:
      tags: [Ads]
      summary: Get default ad description
      description: Returns the company's default ad description text.
      operationId: adDefaultDescription
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /ad/add:
    post:
      tags: [Ads]
      summary: Create ad
      description: |
        Creates a new vehicle and ad listing. Performs VIN/registration lookup and creates the vehicle record.
      operationId: adAdd
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                identifier:
                  type: string
                  description: License plate or VIN
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  /ad/upload/{id}:
    post:
      tags: [Ads]
      summary: Upload media to ad
      description: |
        Upload images, videos, or documents to an ad.

        - `IMAGE`: Upload image files via multipart form
        - `VIDEO`: Provide a YouTube video ID
        - `DOCUMENT`: Upload document files via multipart form
      operationId: adUpload
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Ad ID
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [IMAGE, VIDEO, DOCUMENT]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                youtube_id:
                  type: string
                  description: YouTube video ID (for VIDEO type)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  /ad/deleteUpload/{id}:
    delete:
      tags: [Ads]
      summary: Delete media from ad
      description: |
        Delete one or more media items (images, videos, documents) from an ad.
      operationId: adDeleteUpload
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Ad ID
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [IMAGE, VIDEO, DOCUMENT]
        - name: media_ids
          in: query
          required: true
          schema:
            type: array
            items:
              type: integer
          description: Array of media IDs to delete
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: success
                  results:
                    type: object
                    additionalProperties:
                      type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ═══════════════════════════════════════════════════════════════════════
  #  VEHICLES
  # ═══════════════════════════════════════════════════════════════════════

  /vehicle/get/{identifier}:
    get:
      tags: [Vehicles]
      summary: Lookup vehicle
      description: |
        Look up vehicle data from Norwegian public registries (Statens vegvesen + Brønnøysund).
        Returns technical specifications, registration data, and any registered liens.

        **Note:** Each call costs 0.5 NOK and is tracked in API usage.
      operationId: vehicleGet
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
          description: License plate (e.g. `AB12345`) or VIN (17+ characters)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  vehicle:
                    type: object
                    description: Vehicle data from Vegvesen
                  brreg_liens:
                    type: array
                    items:
                      type: object
                    description: Registered liens from Brønnøysund
        "401":
          $ref: "#/components/responses/Unauthorized"

  /vehicle/add:
    post:
      tags: [Vehicles]
      summary: Add vehicle to inventory
      description: Creates a new vehicle record and ad listing from registration data.
      operationId: vehicleAdd
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                identifier:
                  type: string
                  description: License plate or VIN
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  /vehicle/oemEquipment/{identifier}:
    get:
      tags: [Vehicles]
      summary: Get OEM equipment list
      description: Returns factory equipment list for a vehicle by license plate or VIN.
      operationId: vehicleOemEquipment
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
          description: License plate or VIN
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  /vehicle/serviceHistory/{identifier}:
    get:
      tags: [Vehicles]
      summary: Get service history
      description: Returns the EU/PKK inspection and service history for a vehicle.
      operationId: vehicleServiceHistory
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
          description: License plate or VIN
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  /vehicle/owners/{identifier}:
    get:
      tags: [Vehicles]
      summary: Get ownership history
      description: Returns the registered ownership history for a vehicle.
      operationId: vehicleOwners
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
          description: License plate
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ═══════════════════════════════════════════════════════════════════════
  #  DEALS
  # ═══════════════════════════════════════════════════════════════════════

  /deals/list:
    get:
      tags: [Deals]
      summary: List offers
      description: Returns a paginated list of offers with filters. Includes customer and vehicle summaries.
      operationId: dealsList
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: perPage
          in: query
          schema:
            type: integer
            default: 25
            minimum: 1
            maximum: 100
        - name: status
          in: query
          schema:
            type: string
            default: all
            enum: [all, draft, sent, accepted, declined, expired, converted]
        - name: type
          in: query
          schema:
            type: string
            example: salg,innkjop
          description: Comma-separated offer types
        - name: sortBy
          in: query
          schema:
            type: string
            default: newest
            enum: [newest, oldest, price_desc, price_asc, customer_asc]
        - name: search
          in: query
          schema:
            type: string
          description: Search by offer number, customer, or vehicle
        - name: customer
          in: query
          schema:
            type: string
        - name: vehicle
          in: query
          schema:
            type: string
        - name: priceFrom
          in: query
          schema:
            type: number
        - name: priceTo
          in: query
          schema:
            type: number
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/DealOfferSummary"
                  page:
                    type: integer
                  perPage:
                    type: integer
                  pages:
                    type: integer
                  total:
                    type: integer
                  statusCounts:
                    $ref: "#/components/schemas/DealStatusCounts"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

  /deals/get/{id}:
    get:
      tags: [Deals]
      summary: Get offer
      description: Full offer details including vehicles with financing, line items, trade-ins, events, signatures, and attachments.
      operationId: dealsGet
      parameters:
        - $ref: "#/components/parameters/DealId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: success
                  data:
                    $ref: "#/components/schemas/DealOfferDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /deals/add:
    post:
      tags: [Deals]
      summary: Create offer
      description: |
        Creates a new deal offer. `offer_type` is required. A unique `offer_number` and `portal_token` are auto-generated.
      operationId: dealsAdd
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealOfferCreate"
            example:
              offer_type: salg
              customer_id: 1234
              total_price: 450000
              vat_amount: 90000
              vat_rate: 25
              include_vat: 1
              valid_until: "2025-08-01"
              notes: "Tilbud gjelder i 14 dager."
              vehicles:
                - vehicle_id: 5678
                  make: Toyota
                  model: RAV4
                  year: 2023
                  registration_number: AB12345
                  vehicle_price: 420000
                  mileage: 35000
                  include_financing: 1
                  financing_type: annuity
                  down_payment: 100000
                  interest_rate: 5.99
                  loan_term_months: 60
                  loan_amount: 320000
                  monthly_payment: 6195
              line_items:
                - name: Lakk-beskyttelse
                  quantity: 1
                  unit_price: 15000
                  total_price: 15000
              trade_ins:
                - make: Volkswagen
                  model: Golf
                  year: 2018
                  registration_number: CD67890
                  mileage: 95000
                  estimated_value: 120000
                  condition: good
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 42
                      portal_token:
                        type: string
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /deals/update/{id}:
    put:
      tags: [Deals]
      summary: Update offer
      description: |
        Updates an existing offer. `vehicles`, `line_items`, and `trade_ins` arrays are replaced entirely — include all items you want to keep.
      operationId: dealsUpdate
      parameters:
        - $ref: "#/components/parameters/DealId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealOfferUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      portal_token:
                        type: string
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /deals/updateStatus/{id}:
    post:
      tags: [Deals]
      summary: Update offer status
      description: |
        Updates offer status. Timestamps auto-set: `sent` → `sent_at`, `accepted` → `accepted_at`, `declined` → `declined_at`.
      operationId: dealsUpdateStatus
      parameters:
        - $ref: "#/components/parameters/DealId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [draft, sent, accepted, declined]
                decline_reason:
                  type: string
                  description: Required when status is `declined`
            examples:
              send:
                summary: Send to customer
                value:
                  status: sent
              accept:
                summary: Mark accepted
                value:
                  status: accepted
              decline:
                summary: Mark declined
                value:
                  status: declined
                  decline_reason: "Kunden fant bedre pris hos konkurrent"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: success
                  message:
                    type: string
        "400":
          description: Invalid status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /deals/delete/{id}:
    delete:
      tags: [Deals]
      summary: Delete offer
      description: Permanently deletes an offer. Only `draft` or `sent` offers can be deleted.
      operationId: dealsDelete
      parameters:
        - $ref: "#/components/parameters/DealId"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: success
                  message:
                    type: string
        "400":
          description: Cannot delete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ═══════════════════════════════════════════════════════════════════════
  #  CONTRACTS
  # ═══════════════════════════════════════════════════════════════════════

  /contract/list:
    get:
      tags: [Contracts]
      summary: List contracts
      description: Paginated list of contracts with filters. Includes vehicle summary, owners, and signature status.
      operationId: contractList
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: perPage
          in: query
          schema:
            type: integer
            default: 25
            minimum: 1
            maximum: 100
        - name: status
          in: query
          schema:
            type: string
            default: alle
            enum: [alle, utkast, venter_signering, fullfort]
          description: |
            `alle` = all, `utkast` = draft, `venter_signering` = awaiting signatures, `fullfort` = completed
        - name: type
          in: query
          schema:
            type: string
            default: alle
            enum: [alle, salg, innkjop, formidling, kommisjon]
        - name: sortBy
          in: query
          schema:
            type: string
            default: newest
            enum: [newest, oldest, customer_asc, customer_desc, vehicle_asc, vehicle_desc]
        - name: search
          in: query
          schema:
            type: string
          description: Search by customer, vehicle, or contract ID
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: SUCCESS
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ContractSummary"
                  page:
                    type: integer
                  perPage:
                    type: integer
                  pages:
                    type: integer
                  total:
                    type: integer
                  statusCounts:
                    $ref: "#/components/schemas/ContractStatusCounts"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

  /contract/get/{id}:
    get:
      tags: [Contracts]
      summary: Get contract
      description: Full contract details including vehicle, owners with signature status, pricing, payment, trade-in, insurance, and warranty data.
      operationId: contractGet
      parameters:
        - $ref: "#/components/parameters/ContractId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: SUCCESS
                  data:
                    $ref: "#/components/schemas/ContractDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /contract/add:
    post:
      tags: [Contracts]
      summary: Create contract
      description: |
        Creates a contract using the simplified flow — details, settlement, and owner in a single call.

        Set `contract_type` to `BUY` for incoming (purchase) contracts or `SELL` for outgoing (sale) contracts.
      operationId: contractAdd
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractCreate"
            examples:
              buy:
                summary: Buy contract (incoming purchase)
                value:
                  contract_type: BUY
                  vehicle_id: 5678
                  ads_id: 1234
                  price: 250000
                  delivery_date: "2025-07-01"
                  mileage: 50000
                  contract_art_type: PURCHASE
                  customer_account_number: "12345678901"
                  owner_type: PERSON
                  owner_first_name: Ola
                  owner_last_name: Nordmann
                  owner_email: ola@example.com
                  owner_phone: "91234567"
              sell:
                summary: Sell contract (outgoing sale)
                value:
                  contract_type: SELL
                  vehicle_id: 5678
                  ads_id: 1234
                  price: 350000
                  delivery_date: "2025-07-15"
                  mileage: 65000
                  omreg_price: 3200
                  account_number: "98765432101"
                  owner_type: PERSON
                  owner_first_name: Kari
                  owner_last_name: Hansen
                  owner_email: kari@example.com
                  owner_phone: "98765432"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: SUCCESS
                  message:
                    type: string
                  contract_id:
                    type: integer
                    example: 123
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /contract/update/{id}:
    put:
      tags: [Contracts]
      summary: Update contract
      description: |
        Updates fields on a DRAFT contract. Pass one or more fields to update. Only allowed fields are accepted; unknown fields are ignored.
      operationId: contractUpdate
      parameters:
        - $ref: "#/components/parameters/ContractId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractUpdate"
            example:
              price: 260000
              mileage: 51000
              comments: "Oppdatert pris etter vurdering"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: SUCCESS
                  message:
                    type: string
                    example: Kontrakt oppdatert
                  updated_fields:
                    type: array
                    items:
                      type: string
                    example: [price, mileage, comments]
                  errors:
                    type: array
                    items:
                      type: string
                    description: Any fields that failed to update
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /contract/sign/{id}:
    post:
      tags: [Contracts]
      summary: Complete contract
      description: |
        Marks a DRAFT contract as completed without going through the digital signing flow (BankID/E-Sign).

        Use this when signatures are handled outside of AutoNet. The contract must be in `DRAFT` status.

        > **Note:** Digital signing via BankID is only available through the AutoNet portal UI and cannot be initiated via the API.
      operationId: contractSign
      parameters:
        - $ref: "#/components/parameters/ContractId"
      responses:
        "200":
          description: Contract completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: SUCCESS
                  message:
                    type: string
        "400":
          description: Contract is not in DRAFT status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                response: error
                message: Kontrakten er ikke i utkast.
        "401":
          $ref: "#/components/responses/Unauthorized"

  /contract/delete/{id}:
    delete:
      tags: [Contracts]
      summary: Delete contract
      description: Deletes a contract. Only `DRAFT` contracts without active signature requests can be deleted.
      operationId: contractDelete
      parameters:
        - $ref: "#/components/parameters/ContractId"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: SUCCESS
                  message:
                    type: string
        "400":
          description: Cannot delete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /contract/invoicePdf/{id}:
    get:
      tags: [Contracts]
      summary: Download contract invoice PDF
      description: |
        Returns the contract invoice as a PDF document.

        If the contract has an invoice registered in the accounting system, the accounting PDF is returned.
        Otherwise a generated invoice PDF is returned based on the contract data and order lines.
      operationId: contractInvoicePdf
      parameters:
        - $ref: "#/components/parameters/ContractId"
        - name: currency
          in: query
          schema:
            type: string
            default: NOK
        - name: currency_value
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: PDF document
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /contract/pdf/{id}:
    get:
      tags: [Contracts]
      summary: Download contract document PDF
      description: |
        Returns the full contract document as a PDF with professional headers, footers, and company branding.

        For completed contracts with digital signatures (BankID), the signed PDF is returned when available.
        Otherwise a generated contract PDF is returned with all contract details, terms, declarations, and attached documents.
      operationId: contractPdf
      parameters:
        - $ref: "#/components/parameters/ContractId"
      responses:
        "200":
          description: PDF document
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

