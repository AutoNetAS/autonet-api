openapi: 3.0.0
servers:
  - description: Production
    url: https://app.autonet.no/rest/v1
  - description: Development
    url: https://dev.autonet.no/rest/v1
info:
  description: >
    API for accessing dealer data from AutoNet. This API uses token-based authentication. 
    To access any endpoint, clients must include a 'Token' header with the token found 
    [here](https://app.autonet.no/page/company) under the "API Access" tab.
  version: "1.0.0"
  title: AutoNet API
  contact:
    email: zk@autonet.no
  license:
    name: Apache 2.0
    url: 'http://www.apache.org/licenses/LICENSE-2.0.html'

paths:
  /ad/get:
    get:
      tags:
        - Ads
      summary: Get a list of all ads
      security:
        - TokenHeader: []
      parameters:
        - name: search
          in: query
          description: Min 2 characters mass search
          required: false
          schema:
            type: string
        - name: rows_limit
          in: query
          description: Limit the number of rows returned
          required: false
          schema:
            type: integer
            format: int32
            default: 25
            maximum: 100
        - name: total_rows
          in: query
          description: Total number of rows available
          required: false
          schema:
            type: integer
            format: int32
        - name: order_by
          in: query
          description: Specify the field to order the results by
          required: false
          schema:
            type: string
            enum:
              - update_date
              - creation_date
              - publish_date
              - sale_type
              - contact_id
              - total_price
        - name: order_direction
          in: query
          description: Specify the direction of sorting (e.g., ASC for ascending, DESC for descending)
          required: false
          schema:
            type: string
            enum:
              - ASC
              - DESC
      responses:
        '200':
          description: Data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    ads_id:
                      type: integer
                      format: int32
                    vehicles_id:
                      type: integer
                      format: int32
                    internal_id:
                      type: integer
                      format: int32
                    sale_type:
                      type: string
                      enum:
                        - USED_CAR
                        - NEW_CAR
                        - USED_MC
                        - NEW_MC
                        - MOBILEHOME
                        - CARAVAN
                        - TRAILER
                        - BUS
                        - LEASING
                        - CAR_AUCTION
                        - CAR_SUBSCRIPTION
                    title:
                      type: string
                    registration_price:
                      type: integer
                      format: int32
                    total_price:
                      type: integer
                      format: int32
                    preferences:
                      $ref: '#/components/schemas/Preferences'
                    creation_date:
                      type: integer
                      format: int32
                    update_date:
                      type: integer
                      format: int32
                    publish_date:
                      type: integer
                      format: int32
                    creation_member_id:
                      type: integer
                      format: int32
                    update_member_id:
                      type: integer
                      format: int32
                    publish_member_id:
                      type: integer
                      format: int32
                    make_model:
                      type: string
                    license_number:
                      type: string
                    vin:
                      type: string
                    year:
                      type: integer
                      format: int32
                    mileage:
                      type: integer
                      format: int32
                    eu_last:
                      type: integer
                      format: int32
                    eu_next:
                      type: integer
                      format: int32
                    incoming_date:
                      type: integer
                      format: int32
                    vehiclewarranty:
                      type: string
                    first_registration_date:
                      type: string
                      format: d/m/Y
                    vehicle:
                      type: object
                      properties:
                        type:
                          type: string
                        body:
                          type: string
                        registration_class:
                          type: integer
                          format: int32
                        fuel:
                          type: integer
                          format: int32
                        transmission:
                          type: string
                          enum:
                            - A
                            - M
                        wheel_drive:
                          type: string
                          enum:
                            - FOURWHEELEDRIVE
                            - FRONTWHEELDRIVE
                            - REARWHEELDRIVE
                        exterior_color:
                          type: integer
                          format: int32
                        weight:
                          type: integer
                          format: int32
                    thumbnail_url:
                      type: string
                    svv_status:
                      type: string
                    ad_status:
                      type: string
                    vehicle_status:
                      type: string
  /ad/get/{ID}:
    get:
      tags:
        - Ads
      summary: Get a specific ad
      description: Returns a specific car sale ad based on the provided ID
      security:
        - TokenHeader: []
      parameters:
        - name: ID
          in: path
          required: true
          description: Unique ID of the ad
          schema:
            type: integer
      responses:
        '200':
          description: A specific ad
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ad'
        '404':
          description: Ad not found

  /ad/getByVehicleId/{vehicleID}:
    get:
      tags:
        - Ads
      summary: Get a specific ad
      description: Returns a specific car sale ad based on the provided vehicle ID
      security:
        - TokenHeader: []
      parameters:
        - name: vehicleID
          in: path
          required: true
          description: Unique vehicle ID
          schema:
            type: integer
      responses:
        '200':
          description: A specific ad
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ad'
        '404':
          description: Ad not found

  /ad/getByIdentifier/{Identifier}:
    get:
      tags:
        - Ads
      summary: Get ad by identifier
      description: Returns ad information based on license plate or VIN
      security:
        - TokenHeader: []
      parameters:
        - name: Identifier
          in: path
          required: true
          description: License plate or VIN
          schema:
            type: string
            example: EL23061
      responses:
        '200':
          description: Ad found
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    vehicle_id:
                      type: integer
                      format: int32
                      example: 3488
                    ad_id:
                      type: integer
                      format: int32
                      example: 2478
                    license_number:
                      type: string
                      example: EL23061
                    vin:
                      type: string
                      example: 5YJSA2DN2DFP14338
                    status:
                      type: string
                      enum:
                        - DRAFT
                        - COMING_SOON
                        - IN_STOCK
                        - SOLD
                        - DEACTIVATED
                      example: COMING_SOON
                    creation_date:
                      type: integer
                      format: int64
                      description: Unix timestamp
                      example: 1776329266
        '404':
          description: Ad not found

  /ad/defaultDescription:
    get:
      tags:
        - Ads
      summary: Get the default description template
      description: Returns the default HTML description used by certain dealerships or templates
      security:
        - TokenHeader: []
      responses:
        '200':
          description: Default HTML description
          content:
            application/json:
              schema:
                type: object
                properties:
                  description:
                    type: string
                    description: HTML content
        '404':
          description: Not found

  /ad/upload/{ID}:
    post:
      tags:
        - Ads
      summary: Upload media to an ad
      description: |
        Upload images, PDF documents, or link a YouTube video to an ad.  
        * **type** decides which payload fields are required.  
        * When *type* is **IMAGE** or **DOCUMENT**, attach the files as `multipart/form-data`.  
        * When *type* is **VIDEO**, send a single YouTube video ID instead of files.
      parameters:
        - name: ID
          in: path
          required: true
          description: Unique ID of the ad
          schema:
            type: integer
      security:
        - TokenHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - IMAGE
                    - DOCUMENT
                    - VIDEO
                  description: Select from IMAGE, DOCUMENT or VIDEO
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: |
                    Needed only when **type** is **IMAGE** or **DOCUMENT**.  
                    • **IMAGE** → image files (`image/*`) only.  
                    • **DOCUMENT** → image files or PDFs (`image/*`, `application/pdf`).
                youtube_id:
                  type: string
                  description: |
                    Needed only when **type** is **VIDEO**.  
                    Provide the 11-char ID from the YouTube URL.
      responses:
        '200':
          description: Upload successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    enum:
                      - SUCCESS
                      - WARNING
                      - ERROR
                    example: "SUCCESS"
                  message:
                    type: string
                    example: "3 files uploaded"

  /ad/deleteUpload/{ID}:
    delete:
      tags:
        - Ads
      summary: Delete media from an ad
      description: |
        Deletes one or more images, videos, or documents from an ad.
        * **IMAGE** / **VIDEO** — removes media from storage (and from FINN if the ad is for sale).
        * **DOCUMENT** — removes the uploaded document from storage.
        
        Returns per-ID results so the caller knows which deletions succeeded or failed.
      parameters:
        - name: ID
          in: path
          required: true
          description: Unique ID of the ad
          schema:
            type: integer
        - name: type
          in: query
          required: true
          description: The type of media to delete
          schema:
            type: string
            enum:
              - IMAGE
              - VIDEO
              - DOCUMENT
      security:
        - TokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - media_ids
              properties:
                media_ids:
                  type: array
                  items:
                    type: integer
                    format: int32
                  description: Array of media IDs to delete
                  example: [101, 102, 103]
      responses:
        '200':
          description: Deletion results per media ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    enum:
                      - SUCCESS
                    example: "SUCCESS"
                  results:
                    type: object
                    description: Keyed by media ID, each value contains the result of that deletion
                    additionalProperties:
                      type: object
                      properties:
                        response:
                          type: string
                          enum:
                            - SUCCESS
                            - ERROR
                        message:
                          type: string
                    example:
                      101:
                        response: "SUCCESS"
                        message: "Media deleted"
                      102:
                        response: "ERROR"
                        message: "Media not found"
        '404':
          description: Ad not found

  /vehicle/get/{Identifier}:
